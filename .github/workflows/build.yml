name: Build Blind Linux ISO

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: fedora:44
      options: --privileged
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - name: Install dependencies
        run: |
          dnf install -y \
            livecd-tools \
            squashfs-tools \
            xorriso \
            syslinux \
            isolinux \
            mtools \
            dosfstools \
            git \
            wget

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build ISO
        run: sudo ./build.sh build

      - name: Get ISO filename
        id: iso
        run: |
          ISO_FILE=$(find . -maxdepth 1 -name "BlindLinux*.iso" -type f | head -1)
          if [ -z "${ISO_FILE}" ]; then
            echo "ERROR: No ISO file found"
            ls -la
            exit 1
          fi
          echo "ISO found: ${ISO_FILE}"
          echo "path=${ISO_FILE}" >> "$GITHUB_OUTPUT"
          echo "filename=$(basename "${ISO_FILE}")" >> "$GITHUB_OUTPUT"

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: blindlinux-${{ github.sha }}
          path: |
            ${{ steps.iso.outputs.path }}
            ${{ steps.iso.outputs.path }}.sha256
          retention-days: 30

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.iso.outputs.path }}
            ${{ steps.iso.outputs.path }}.sha256
          draft: true
          generate_release_notes: true
